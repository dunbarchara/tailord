apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: prometheus-local
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    jsonData:
      httpMethod: POST

  - name: Loki
    type: loki
    uid: loki-local
    url: http://loki:3100
    access: proxy
    jsonData:
      maxLines: 1000

  - name: Tempo
    type: tempo
    uid: tempo-local
    url: http://tempo:3200
    access: proxy
    jsonData:
      serviceMap:
        datasourceUid: prometheus-local
      lokiSearch:
        datasourceUid: loki-local

  - name: PostgreSQL
    type: postgres
    uid: postgres-local
    url: db:5432
    database: app
    user: app
    secureJsonData:
      password: app
    jsonData:
      sslmode: disable
      postgresVersion: 1600
