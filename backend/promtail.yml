server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: tailord-backend
    static_configs:
      - targets:
          - localhost
        labels:
          job: tailord-backend
          __path__: /var/log/tailord/app.jsonl*
    pipeline_stages:
      - json:
          expressions:
            level: level
            logger: logger
            correlation_id: correlation_id
            tailoring_id: tailoring_id
            timestamp: timestamp
      - labels:
          level:
          logger:
      - timestamp:
          source: timestamp
          format: RFC3339Nano
