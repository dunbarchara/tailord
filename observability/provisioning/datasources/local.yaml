apiVersion: 1

datasources:
  - name: Prometheus
    type: prometheus
    uid: __PROMETHEUS_UID__
    url: http://prometheus:9090
    access: proxy
    isDefault: true
    jsonData:
      httpMethod: POST

  - name: Loki
    type: loki
    uid: __LOKI_UID__
    url: http://loki:3100
    access: proxy
    jsonData:
      maxLines: 1000

  - name: Tempo
    type: tempo
    uid: __TEMPO_UID__
    url: http://tempo:3200
    access: proxy
    jsonData:
      serviceMap:
        datasourceUid: __PROMETHEUS_UID__
      lokiSearch:
        datasourceUid: __LOKI_UID__

  - name: PostgreSQL
    type: postgres
    uid: __POSTGRES_UID__
    url: db:5432
    database: app
    user: app
    secureJsonData:
      password: app
    jsonData:
      sslmode: disable
      postgresVersion: 1600
