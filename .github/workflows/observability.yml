name: Observability — Grafana lifecycle

# Deploys dashboard JSON files to an already-running Grafana instance.
# Grafana lifecycle (create/destroy) is managed entirely by Terraform locally —
# see infra/providers/azure/BOOTSTRAP.md step 8 and planning/workflows.md.
# Underlying data (Log Analytics, Managed Prometheus, App Insights) is always running and
# retains history regardless of Grafana's state.

on:
  workflow_dispatch: {}

permissions: {}

