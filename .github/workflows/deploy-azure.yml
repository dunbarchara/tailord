name: Deploy to Azure Container Apps

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

env:
  ACR_REGISTRY: tailord.azurecr.io
  BACKEND_PROD: tailord-backend-prod
  FRONTEND_PROD: tailord-frontend-prod
  BACKEND_STAGING: tailord-backend-staging
  FRONTEND_STAGING: tailord-frontend-staging
  RESOURCE_GROUP: tailord

jobs:

  # ---------------------------------------------------------------------------
  # BUILD — build, scan, and push both images to ACR
  # ---------------------------------------------------------------------------
  build:

    runs-on: ubuntu-latest

    environment:
      name: production-azure
      url: https://tailord.app

    permissions:
      id-token: write
      contents: read

    outputs:
      tag: ${{ steps.generate_tag.outputs.tag_name }}

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Generate image tag
      id: generate_tag
      run: |
        BUILD_DATE=$(date +'%Y%m%d')
        BUILD_NUM=${{ github.run_number }}
        echo "tag_name=$BUILD_DATE.$BUILD_NUM" >> $GITHUB_OUTPUT

    - name: Azure login (OIDC)
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Login to ACR
      run: az acr login --name tailord

    - name: Build frontend image
      working-directory: ./frontend/
      run: docker build -t $ACR_REGISTRY/tailord-frontend:${{ steps.generate_tag.outputs.tag_name }} .

    - name: Trivy scan — frontend
      uses: aquasecurity/trivy-action@v0.35.0
      with:
        image-ref: ${{ env.ACR_REGISTRY }}/tailord-frontend:${{ steps.generate_tag.outputs.tag_name }}
        format: table
        exit-code: "1"
        severity: CRITICAL
        ignore-unfixed: true

    - name: Push frontend image
      run: docker push $ACR_REGISTRY/tailord-frontend:${{ steps.generate_tag.outputs.tag_name }}

    - name: Build backend image
      working-directory: ./backend/
      run: docker build -t $ACR_REGISTRY/tailord-backend:${{ steps.generate_tag.outputs.tag_name }} .

    - name: Trivy scan — backend
      uses: aquasecurity/trivy-action@v0.35.0
      with:
        image-ref: ${{ env.ACR_REGISTRY }}/tailord-backend:${{ steps.generate_tag.outputs.tag_name }}
        format: table
        exit-code: "1"
        severity: CRITICAL
        ignore-unfixed: true

    - name: Push backend image
      run: docker push $ACR_REGISTRY/tailord-backend:${{ steps.generate_tag.outputs.tag_name }}

  # ---------------------------------------------------------------------------
  # DEPLOY STAGING — blue/green deploy to isolated staging apps
  # Backend first (runs migrations), then frontend.
  # ---------------------------------------------------------------------------
  deploy-staging:

    needs: build
    runs-on: ubuntu-latest

    environment:
      name: staging-azure
      url: https://staging.tailord.app

    permissions:
      id-token: write
      contents: read

    env:
      TAG: ${{ needs.build.outputs.tag }}
      SUFFIX: r${{ github.run_number }}

    steps:
    - name: Azure login (OIDC)
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy staging backend revision
      run: |
        az containerapp update \
          --name $BACKEND_STAGING \
          --resource-group $RESOURCE_GROUP \
          --image $ACR_REGISTRY/tailord-backend:$TAG \
          --revision-suffix $SUFFIX

    - name: Promote staging backend revision
      run: |
        REVISION="${BACKEND_STAGING}--${SUFFIX}"
        for i in $(seq 1 24); do
          STATE=$(az containerapp revision show \
            --name $BACKEND_STAGING \
            --resource-group $RESOURCE_GROUP \
            --revision "$REVISION" \
            --query "properties.runningState" \
            --output tsv 2>/dev/null || echo "Unknown")
          echo "  attempt $i: $STATE"
          if [ "$STATE" = "Running" ] || [ "$STATE" = "RunningAtMaxScale" ]; then
            break
          fi
          if [ "$i" = "24" ]; then
            echo "ERROR: $BACKEND_STAGING revision did not reach Running state"
            exit 1
          fi
          sleep 10
        done
        az containerapp ingress traffic set \
          --name $BACKEND_STAGING \
          --resource-group $RESOURCE_GROUP \
          --revision-weight "$REVISION=100"
        az containerapp revision list \
          --name $BACKEND_STAGING \
          --resource-group $RESOURCE_GROUP \
          --query "[?name!='$REVISION' && properties.active==\`true\`].name" \
          --output tsv | while read -r rev; do
            [ -z "$rev" ] && continue
            echo "Deactivating $rev"
            az containerapp revision deactivate \
              --name $BACKEND_STAGING \
              --resource-group $RESOURCE_GROUP \
              --revision "$rev"
          done

    - name: Deploy staging frontend revision
      run: |
        az containerapp update \
          --name $FRONTEND_STAGING \
          --resource-group $RESOURCE_GROUP \
          --image $ACR_REGISTRY/tailord-frontend:$TAG \
          --revision-suffix $SUFFIX

    - name: Promote staging frontend revision
      run: |
        REVISION="${FRONTEND_STAGING}--${SUFFIX}"
        for i in $(seq 1 24); do
          STATE=$(az containerapp revision show \
            --name $FRONTEND_STAGING \
            --resource-group $RESOURCE_GROUP \
            --revision "$REVISION" \
            --query "properties.runningState" \
            --output tsv 2>/dev/null || echo "Unknown")
          echo "  attempt $i: $STATE"
          if [ "$STATE" = "Running" ] || [ "$STATE" = "RunningAtMaxScale" ]; then
            break
          fi
          if [ "$i" = "24" ]; then
            echo "ERROR: $FRONTEND_STAGING revision did not reach Running state"
            exit 1
          fi
          sleep 10
        done
        az containerapp ingress traffic set \
          --name $FRONTEND_STAGING \
          --resource-group $RESOURCE_GROUP \
          --revision-weight "$REVISION=100"
        az containerapp revision list \
          --name $FRONTEND_STAGING \
          --resource-group $RESOURCE_GROUP \
          --query "[?name!='$REVISION' && properties.active==\`true\`].name" \
          --output tsv | while read -r rev; do
            [ -z "$rev" ] && continue
            echo "Deactivating $rev"
            az containerapp revision deactivate \
              --name $FRONTEND_STAGING \
              --resource-group $RESOURCE_GROUP \
              --revision "$rev"
          done

  # ---------------------------------------------------------------------------
  # SMOKE TEST STAGING — verify staging frontend is up before promoting to prod
  # ---------------------------------------------------------------------------
  smoke-test-staging:

    needs: deploy-staging
    runs-on: ubuntu-latest

    steps:
    - name: Health check — staging homepage
      run: |
        STATUS=$(curl \
          --silent \
          --output /dev/null \
          --write-out "%{http_code}" \
          --retry 6 \
          --retry-delay 10 \
          --retry-connrefused \
          --retry-all-errors \
          https://staging.tailord.app)
        echo "Staging homepage status: $STATUS"
        if [ "$STATUS" != "200" ] && [ "$STATUS" != "307" ] && [ "$STATUS" != "302" ]; then
          echo "ERROR: unexpected status $STATUS"
          exit 1
        fi

  # ---------------------------------------------------------------------------
  # DEPLOY PROD — blue/green deploy to prod apps with the same images
  # Backend first (runs migrations), then frontend.
  # ---------------------------------------------------------------------------
  deploy-prod:

    needs: [build, smoke-test-staging]
    runs-on: ubuntu-latest

    environment:
      name: production-azure
      url: https://tailord.app

    permissions:
      id-token: write
      contents: read

    env:
      TAG: ${{ needs.build.outputs.tag }}
      SUFFIX: r${{ github.run_number }}

    steps:
    - name: Azure login (OIDC)
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Deploy prod backend revision
      run: |
        az containerapp update \
          --name $BACKEND_PROD \
          --resource-group $RESOURCE_GROUP \
          --image $ACR_REGISTRY/tailord-backend:$TAG \
          --revision-suffix $SUFFIX

    - name: Promote prod backend revision
      run: |
        REVISION="${BACKEND_PROD}--${SUFFIX}"
        for i in $(seq 1 24); do
          STATE=$(az containerapp revision show \
            --name $BACKEND_PROD \
            --resource-group $RESOURCE_GROUP \
            --revision "$REVISION" \
            --query "properties.runningState" \
            --output tsv 2>/dev/null || echo "Unknown")
          echo "  attempt $i: $STATE"
          if [ "$STATE" = "Running" ] || [ "$STATE" = "RunningAtMaxScale" ]; then
            break
          fi
          if [ "$i" = "24" ]; then
            echo "ERROR: $BACKEND_PROD revision did not reach Running state"
            exit 1
          fi
          sleep 10
        done
        az containerapp ingress traffic set \
          --name $BACKEND_PROD \
          --resource-group $RESOURCE_GROUP \
          --revision-weight "$REVISION=100"
        az containerapp revision list \
          --name $BACKEND_PROD \
          --resource-group $RESOURCE_GROUP \
          --query "[?name!='$REVISION' && properties.active==\`true\`].name" \
          --output tsv | while read -r rev; do
            [ -z "$rev" ] && continue
            echo "Deactivating $rev"
            az containerapp revision deactivate \
              --name $BACKEND_PROD \
              --resource-group $RESOURCE_GROUP \
              --revision "$rev"
          done

    - name: Deploy prod frontend revision
      run: |
        az containerapp update \
          --name $FRONTEND_PROD \
          --resource-group $RESOURCE_GROUP \
          --image $ACR_REGISTRY/tailord-frontend:$TAG \
          --revision-suffix $SUFFIX

    - name: Promote prod frontend revision
      run: |
        REVISION="${FRONTEND_PROD}--${SUFFIX}"
        for i in $(seq 1 24); do
          STATE=$(az containerapp revision show \
            --name $FRONTEND_PROD \
            --resource-group $RESOURCE_GROUP \
            --revision "$REVISION" \
            --query "properties.runningState" \
            --output tsv 2>/dev/null || echo "Unknown")
          echo "  attempt $i: $STATE"
          if [ "$STATE" = "Running" ] || [ "$STATE" = "RunningAtMaxScale" ]; then
            break
          fi
          if [ "$i" = "24" ]; then
            echo "ERROR: $FRONTEND_PROD revision did not reach Running state"
            exit 1
          fi
          sleep 10
        done
        az containerapp ingress traffic set \
          --name $FRONTEND_PROD \
          --resource-group $RESOURCE_GROUP \
          --revision-weight "$REVISION=100"
        az containerapp revision list \
          --name $FRONTEND_PROD \
          --resource-group $RESOURCE_GROUP \
          --query "[?name!='$REVISION' && properties.active==\`true\`].name" \
          --output tsv | while read -r rev; do
            [ -z "$rev" ] && continue
            echo "Deactivating $rev"
            az containerapp revision deactivate \
              --name $FRONTEND_PROD \
              --resource-group $RESOURCE_GROUP \
              --revision "$rev"
          done

  # ---------------------------------------------------------------------------
  # SMOKE TEST PROD — verify prod is healthy after deployment
  # ---------------------------------------------------------------------------
  smoke-test-prod:

    needs: deploy-prod
    runs-on: ubuntu-latest

    steps:
    - name: Health check — prod backend
      run: |
        curl \
          --fail \
          --silent \
          --show-error \
          --retry 6 \
          --retry-delay 10 \
          --retry-connrefused \
          --retry-all-errors \
          https://tailord.app/api/health

    - name: Health check — prod homepage
      run: |
        STATUS=$(curl \
          --silent \
          --output /dev/null \
          --write-out "%{http_code}" \
          --retry 3 \
          --retry-delay 5 \
          https://tailord.app)
        echo "Prod homepage status: $STATUS"
        if [ "$STATUS" != "200" ] && [ "$STATUS" != "307" ] && [ "$STATUS" != "302" ]; then
          echo "ERROR: unexpected status $STATUS"
          exit 1
        fi

  # ---------------------------------------------------------------------------
  # PURGE ACR — clean up old images after successful prod deploy
  # ---------------------------------------------------------------------------
  purge-acr:

    needs: smoke-test-prod
    runs-on: ubuntu-latest

    environment:
      name: production-azure

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Azure login (OIDC)
      uses: azure/login@v3
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Purge old ACR images (keep last 3)
      run: |
        for REPO in tailord-frontend tailord-backend; do
          TAGS=$(az acr repository show-tags \
            --name tailord \
            --repository "$REPO" \
            --orderby time_asc \
            --output tsv)

          TAG_COUNT=$(echo "$TAGS" | grep -c .)
          DELETE_COUNT=$((TAG_COUNT - 3))

          if [ "$DELETE_COUNT" -gt 0 ]; then
            echo "$TAGS" | head -n "$DELETE_COUNT" | while read -r tag; do
              echo "Deleting $REPO:$tag"
              az acr repository delete \
                --name tailord \
                --image "$REPO:$tag" \
                --yes
            done
          else
            echo "$REPO: nothing to purge ($TAG_COUNT image(s))"
          fi
        done
