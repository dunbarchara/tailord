name: Build and Push Docker Image to AWS ECR

on:
  push:
    branches: [ "main" ]

env:
  AWS_REGION: us-east-2
  ECR_REPOSITORY: tailord
  ECS_CLUSTER: tailord-cluster
  ECS_SERVICE: tailord-service
  TASK_DEFINITION_FAMILY: tailord-task
  TASK_CONTAINER: tailord

jobs:

  deploy:

    runs-on: ubuntu-latest

    environment: 
      name: production
      url: ${{ steps.deployment.outputs.page_url }}

    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Generate date and build number
      id: generate_tag
      run: |
          # Get current date in YYYYMMDD format
          BUILD_DATE=$(date +'%Y%m%d')
          # Get the unique run number for the current workflow
          BUILD_NUM=${{ github.run_number }}
          # Combine them into a tag name, e.g., 'v20260104.1'
          TAG_NAME="$BUILD_DATE.$BUILD_NUM"
          # Set the tag name as an output for subsequent steps
          echo "Generated tag name: $TAG_NAME"
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT

    - name: Configure AWS credentials (OIDC)
      uses: aws-actions/configure-aws-credentials@v4
      with:
        role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
        aws-region: ${{ env.AWS_REGION }}

    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@v2

    - name: Build and push Docker image
      env:
        IMAGE_TAG: ${{ steps.generate_tag.outputs.TAG_NAME }}
      working-directory: ./frontend/
      run: |
        docker build -t $ECR_REPOSITORY:$IMAGE_TAG .
        docker tag $ECR_REPOSITORY:$IMAGE_TAG \
          $(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
        docker push \
          $(aws sts get-caller-identity --query Account --output text).dkr.ecr.$AWS_REGION.amazonaws.com/$ECR_REPOSITORY:$IMAGE_TAG
        
    - name: Render new task definition
      id: task-def
      uses: aws-actions/amazon-ecs-render-task-definition@v1
      with:
        task-definition-family: ${{ env.TASK_DEFINITION_FAMILY }}
        container-name: ${{ env.TASK_CONTAINER }}
        image: ${{ steps.login-ecr.outputs.registry }}/${{ env.ECR_REPOSITORY }}:${{ steps.generate_tag.outputs.TAG_NAME }}

    - name: Deploy to ECS service
      uses: aws-actions/amazon-ecs-deploy-task-definition@v1
      with:
        cluster: ${{ env.ECS_CLUSTER }}
        service: ${{ env.ECS_SERVICE }}
        task-definition: ${{ steps.task-def.outputs.task-definition }}
        wait-for-service-stability: true
