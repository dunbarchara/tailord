version: 2

updates:
  # --- FRONTEND (npm) ---
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      frontend-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
    ignore:
      # eslint 10 removed context.getFilename() — eslint-config-next's bundled
      # eslint-plugin-react still uses the old API. Unblock when Next.js ships
      # eslint-config-next with ESLint 10 support.
      - dependency-name: "eslint"
        versions: ["10.x"]

  # --- BACKEND (uv) ---
  - package-ecosystem: uv
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      backend-deps:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # --- GITHUB ACTIONS ---
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions-deps:
        patterns:
          - "*"
